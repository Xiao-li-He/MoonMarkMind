<svg width="1100" height="760" viewBox="0 0 1100 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="94" y1="40" x2="1008" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F5FBFF"/>
      <stop offset="0.58" stop-color="#EEF6FD"/>
      <stop offset="1" stop-color="#E7F0FA"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(180 100) rotate(28) scale(220 150)">
      <stop stop-color="white" stop-opacity="0.95"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(900 130) rotate(140) scale(260 180)">
      <stop stop-color="#B9E3FF" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#B9E3FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#88A9C7" flood-opacity="0.18"/>
    </filter>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#88A9C7" flood-opacity="0.14"/>
    </filter>
    <linearGradient id="rose" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFB9B1"/>
      <stop offset="1" stop-color="#FF857B"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFDAB0"/>
      <stop offset="1" stop-color="#FFB468"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#BCEED0"/>
      <stop offset="1" stop-color="#86D7B3"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#89DFFF"/>
      <stop offset="1" stop-color="#46B9F5"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#D9CCFF"/>
      <stop offset="1" stop-color="#A8B6FF"/>
    </linearGradient>
    <style>
      .title { font: 700 30px "Segoe UI", "PingFang SC", sans-serif; fill: #27405C; }
      .sub { font: 600 15px "Segoe UI", "PingFang SC", sans-serif; fill: #6E86A1; letter-spacing: .08em; }
      .node { font: 600 18px "Segoe UI", "PingFang SC", sans-serif; fill: #28415D; }
      .center { font: 700 27px "Segoe UI", "PingFang SC", sans-serif; fill: white; }
      .hint { font: 500 15px "Segoe UI", "PingFang SC", sans-serif; fill: #748AA2; }
      .small { font: 600 13px "Segoe UI", "PingFang SC", sans-serif; fill: #7C93AB; }
    </style>
  </defs>

  <rect width="1100" height="760" rx="34" fill="url(#bg)"/>
  <rect width="1100" height="760" rx="34" fill="url(#glowA)"/>
  <rect width="1100" height="760" rx="34" fill="url(#glowB)"/>
  <rect x="18" y="18" width="1064" height="724" rx="28" fill="none" stroke="#D1E3F2" stroke-width="2"/>

  <text x="76" y="84" class="title">Fill Style Preview</text>
  <text x="350" y="84" class="sub">MOONMARKMIND CURRENT UI DIRECTION</text>

  <g transform="translate(60 132)" filter="url(#shadow)">
    <rect x="0" y="0" width="980" height="560" rx="34" fill="rgba(255,255,255,0.42)" stroke="#D7E7F4" stroke-width="2"/>
    <text x="38" y="42" class="hint">填充样式更适合现在的玻璃感界面，节点信息密度高时也更容易扫读。</text>

    <path d="M310 244C378 244 378 108 456 108" stroke="#FF8B83" stroke-width="4" stroke-linecap="round"/>
