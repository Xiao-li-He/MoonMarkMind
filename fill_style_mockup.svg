      <rect x="456" y="238" width="152" height="60" rx="13" fill="url(#green)" stroke="#55C3FB" stroke-width="2"/>
      <text x="532" y="276" text-anchor="middle" class="node">分支主题 3</text>

      <rect x="456" y="318" width="152" height="60" rx="13" fill="url(#blue)" stroke="#55C3FB" stroke-width="2"/>
      <text x="532" y="356" text-anchor="middle" class="node">分支主题 4</text>

      <rect x="456" y="398" width="152" height="60" rx="13" fill="url(#violet)" stroke="#55C3FB" stroke-width="2"/>
      <text x="532" y="436" text-anchor="middle" class="node">分支主题 5</text>
    </g>

    <path d="M608 108H658" stroke="#FF8B83" stroke-width="3"/>
    <circle cx="659" cy="108" r="6" fill="white" stroke="#FF8B83" stroke-width="3"/>
    <path d="M665 108H706" stroke="#FF8B83" stroke-width="3"/>
    <rect x="708" y="89" width="124" height="38" rx="10" fill="white" stroke="#90D2FF" stroke-width="2"/>
    <text x="770" y="113" text-anchor="middle" class="small">细分主题 A</text>

    <path d="M608 188H658" stroke="#FFB56C" stroke-width="3"/>
    <circle cx="659" cy="188" r="6" fill="white" stroke="#FFB56C" stroke-width="3"/>
    <path d="M665 188H706" stroke="#FFB56C" stroke-width="3"/>
    <rect x="708" y="169" width="124" height="38" rx="10" fill="white" stroke="#90D2FF" stroke-width="2"/>
    <text x="770" y="193" text-anchor="middle" class="small">细分主题 B</text>

    <path d="M608 268H658" stroke="#74D9C4" stroke-width="3"/>
    <circle cx="659" cy="268" r="6" fill="white" stroke="#74D9C4" stroke-width="3"/>
    <path d="M665 268H706" stroke="#74D9C4" stroke-width="3"/>
    <rect x="708" y="249" width="124" height="38" rx="10" fill="white" stroke="#90D2FF" stroke-width="2"/>
    <text x="770" y="273" text-anchor="middle" class="small">细分主题 C</text>

    <g transform="translate(694 368)">
      <rect x="0" y="0" width="236" height="126" rx="18" fill="rgba(255,255,255,0.62)" stroke="#D2E3F0" stroke-width="2"/>
      <text x="22" y="30" class="sub">配色分工</text>
      <circle cx="28" cy="58" r="7" fill="#FF8B83"/>
      <text x="48" y="64" class="hint">高优先、提醒、关键分支</text>
      <circle cx="28" cy="84" r="7" fill="#FFB56C"/>
      <text x="48" y="90" class="hint">说明、补充、次级信息</text>
      <circle cx="28" cy="110" r="7" fill="#74D9C4"/>
      <text x="48" y="116" class="hint">稳定内容、默认推荐色</text>
    </g>
