<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MoonMarkMind</title>
    <style>
      :root {
        --paper: #faf0c9;
        --panel: rgba(255, 251, 242, 0.92);
        --editor: #e6f3e8;
        --canvas: #f4efed;
        --ink: #2b2721;
        --muted: #7f786f;
        --line: rgba(43, 39, 33, 0.14);
        --red: #ef4f43;
        --green: #2c9f4b;
        --blue: #2f79de;
        --orange: #ec9b1e;
        --gray: #8e98a3;
        --teal: #1a7a72;
        --tree: rgba(47, 121, 222, 0.3);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        color: var(--ink);
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        background: linear-gradient(180deg, #fff8e8 0%, #f3e7c1 100%);
        overflow: hidden;
      }

      button,
      select,
      textarea {
        font: inherit;
      }

      #app {
        height: 100vh;
        padding: 14px;
        overflow: hidden;
      }

      .app-shell {
        width: 100%;
        margin: 0 auto;
        display: grid;
        grid-template-rows: auto 1fr;
        gap: 14px;
        padding: 18px;
        height: 100%;
        border: 3px solid rgba(43, 39, 33, 0.16);
        border-radius: 36px;
        background: rgba(250, 240, 201, 0.9);
        overflow: hidden;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px 20px;
        flex-wrap: wrap;
      }

      .topbar-group {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 10px 14px;
      }

      .topbar-group--controls {
        justify-content: flex-end;
      }

      .topbar-title {
        min-width: 92px;
        font-size: 18px;
        font-weight: 700;
      }

      .tool-button {
        appearance: none;
        min-width: 72px;
        height: 44px;
        padding: 0 16px;
        border-radius: 16px;
        border: 3px solid rgba(43, 39, 33, 0.08);
        background: rgba(255, 255, 255, 0.86);
        color: var(--ink);
        cursor: pointer;
      }

      .tool-button--red {
        color: var(--red);
        border-color: rgba(239, 79, 67, 0.36);
      }

      .tool-button--green {
        color: var(--green);
        border-color: rgba(44, 159, 75, 0.36);
      }

      .tool-button--blue {
        color: var(--blue);
        border-color: rgba(47, 121, 222, 0.36);
      }

      .tool-button--soft {
        color: var(--muted);
        border-color: rgba(127, 120, 111, 0.24);
      }

      .tool-select-wrap {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .tool-select-label {
        font-size: 14px;
        color: var(--muted);
      }

      .tool-select {
        min-width: 108px;
        height: 44px;
        padding: 0 12px;
        border-radius: 16px;
        border: 3px solid rgba(142, 152, 163, 0.3);
        background: rgba(255, 255, 255, 0.88);
        color: var(--ink);
      }

      .tool-select option {
        color: var(--ink);
        background: rgba(255, 255, 255, 0.98);
      }

      .tool-select option:checked {
        color: var(--ink);
        background: rgba(43, 39, 33, 0.14);
      }

      .tool-select--accent {
        border-color: rgba(236, 155, 30, 0.42);
        color: var(--orange);
      }

      .tool-select--muted {
        border-color: rgba(142, 152, 163, 0.42);
        color: var(--gray);
      }

      .tool-select--muted option:checked {
        color: var(--gray);
        background: rgba(142, 152, 163, 0.16);
      }

      .workspace {
        --left-pane-percent: 33%;
        --mindmap-toolbar-min-width: 414px;
        display: grid;
        grid-template-columns: minmax(300px, var(--left-pane-percent)) 14px minmax(var(--mindmap-toolbar-min-width), 1fr);
        gap: 8px;
        align-items: stretch;
        min-height: 0;
        height: 100%;
      }

      .editor-panel,
      .mindmap-panel {
        display: grid;
        align-content: start;
        gap: 12px;
        min-height: 0;
        padding: 18px 20px;
        border: 3px solid rgba(43, 39, 33, 0.16);
        border-radius: 32px;
        background: var(--panel);
        overflow: hidden;
      }

      .editor-panel {
        background: rgba(230, 243, 232, 0.72);
        grid-template-rows: 1fr;
      }

      .mindmap-panel {
        align-content: stretch;
        position: relative;
        container-type: inline-size;
        background: rgba(244, 239, 237, 0.95);
        grid-template-rows: auto minmax(0, 1fr);
        gap: 6px;
        padding: 12px 10px 10px;
        overflow: visible;
      }

      .workspace-divider {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: col-resize;
      }

      .workspace-divider__track {
        width: 5px;
        height: 100%;
        border-radius: 999px;
        background: rgba(43, 39, 33, 0.42);
      }

      .workspace-divider__handle {
        position: absolute;
        width: 10px;
        height: 136px;
        border-radius: 999px;
        background: linear-gradient(180deg, rgba(120, 115, 105, 0.9), rgba(108, 102, 93, 0.82));
        box-shadow: 0 6px 14px rgba(43, 39, 33, 0.12);
      }

      .editor-surface,
      .mindmap-surface {
        border: 0;
        border-radius: 0;
        overflow: hidden;
        min-height: 0;
        box-shadow: none;
      }

      .editor-surface {
        background: transparent;
      }

      .mindmap-surface {
        background: transparent;
        height: 100%;
      }

      .editor-panel .editor-surface,
      .mindmap-panel .mindmap-surface {
        margin-top: 0;
      }

      textarea {
        width: 100%;
        height: 100%;
        min-height: 0;
        resize: none;
        border: 0;
        padding: 16px 12px;
        background: transparent;
        color: var(--ink);
        font: 16px/1.7 "Cascadia Code", "Consolas", monospace;
        overflow: auto;
      }

      textarea:focus {
        outline: none;
      }

      .mindmap-toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: flex-start;
        justify-content: space-between;
        column-gap: 16px;
        row-gap: 10px;
        padding: 0 2px 4px;
        position: relative;
        z-index: 3;
      }

      .mindmap-toolbar__actions {
        display: flex;
        flex-wrap: nowrap;
        gap: 10px;
        flex: 0 0 auto;
        min-width: max-content;
      }

      .mindmap-toolbar__side {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 10px;
        flex: 0 0 auto;
        margin-left: auto;
        min-width: fit-content;
      }

      .mindmap-side-tools {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .mindmap-tool,
      .mindmap-aux-button {
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 40px;
        height: 40px;
        padding: 0;
        appearance: none;
        border: 0;
        border-radius: 14px;
        text-align: center;
        color: var(--teal);
        background: rgba(255, 255, 255, 0.82);
        box-shadow: 0 8px 18px rgba(43, 39, 33, 0.08);
        font-size: 14px;
        line-height: 1;
        white-space: nowrap;
        cursor: default;
      }

      .mindmap-tool {
        cursor: pointer;
      }

      .mindmap-tool--disabled,
      .mindmap-tool[data-disabled="true"] {
        color: var(--gray);
        background: rgba(255, 255, 255, 0.56);
        box-shadow: none;
        cursor: not-allowed;
        opacity: 0.72;
      }

      .mindmap-aux-button--disabled,
      .mindmap-aux-button[data-disabled="true"] {
        color: var(--gray);
        background: rgba(255, 255, 255, 0.56);
        box-shadow: none;
        cursor: not-allowed;
        opacity: 0.72;
      }

      .mindmap-tool::after,
      .mindmap-aux-button::after {
        content: attr(data-tip);
        position: absolute;
        left: 50%;
        top: calc(100% + 8px);
        transform: translateX(-50%) translateY(-6px);
        padding: 5px 8px;
        border-radius: 10px;
        background: rgba(43, 39, 33, 0.88);
        color: white;
        font-size: 12px;
        line-height: 1;
        letter-spacing: 0.02em;
        white-space: nowrap;
        opacity: 0;
        pointer-events: none;
        z-index: 5;
        transition: opacity 120ms ease, transform 120ms ease;
      }

      .mindmap-tool:hover::after,
      .mindmap-tool:focus-visible::after,
      .mindmap-aux-button:hover::after,
      .mindmap-aux-button:focus-visible::after {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }

      .mindmap-tool:hover,
      .mindmap-tool:focus-visible,
      .mindmap-aux-button:hover,
      .mindmap-aux-button:focus-visible {
        background: rgba(255, 255, 255, 0.92);
        outline: none;
      }

      .mindmap-aux-button#recenter-view {
        cursor: pointer;
      }

      .tool-icon {
        display: inline-flex;
        width: 22px;
        height: 22px;
        color: currentColor;
      }

      .tool-icon svg {
        width: 100%;
        height: 100%;
        stroke: currentColor;
        stroke-width: 1.8;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .mindmap-canvas-shell {
        display: flex;
        min-height: 0;
        height: 100%;
      }

      .mindmap-surface {
        flex: 1;
        min-height: 0;
        border: 2px dashed rgba(43, 39, 33, 0.24);
        border-radius: 26px;
      }

      .mindmap {
        --pan-x: 0px;
        --pan-y: 0px;
        --zoom: 1;
        position: relative;
        height: 100%;
        min-height: 0;
        padding: 6px 2px 2px;
        overflow: hidden;
        cursor: grab;
      }

      .mindmap-content {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(
            calc(-50% + var(--pan-x)),
            calc(-50% + var(--pan-y))
          )
          scale(var(--zoom));
        transform-origin: center center;
      }

      .mindmap.is-panning {
        cursor: grabbing;
      }

      .mindmap-zoom {
        display: flex;
        justify-content: flex-end;
        flex: 0 0 auto;
        padding: 0;
      }

      .zoom-strip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        width: 138px;
        height: 40px;
        padding: 4px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.82);
        box-shadow: 0 8px 18px rgba(43, 39, 33, 0.08);
      }

      .zoom-chip {
        width: 32px;
        height: 32px;
        border: 0;
        border-radius: 10px;
        background: rgba(142, 152, 163, 0.16);
        color: var(--ink);
      }

      .zoom-value {
        flex: 1;
        min-width: 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1;
        text-align: center;
        font-variant-numeric: tabular-nums;
        letter-spacing: -0.01em;
      }

      .ascii-output {
        display: none;
      }

      .mindmap-stage {
        display: grid;
        grid-template-columns: minmax(220px, 1fr) auto minmax(220px, 1fr);
        gap: 28px;
        align-items: start;
        min-width: 860px;
        padding: 20px 4px;
      }

      .mindmap-stage--vertical {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
        min-width: 720px;
      }

      .mindmap-stage--single-right {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 18px;
        min-width: 860px;
      }

      .center-wrap {
        position: sticky;
        top: 8px;
        display: flex;
        justify-content: center;
        padding-top: 98px;
      }

      .vertical-root {
        display: flex;
        justify-content: center;
      }

      .vertical-tree {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
      }

      .vertical-tree__children {
        position: relative;
        display: flex;
        justify-content: center;
        gap: 18px;
        padding-top: 26px;
      }

      .vertical-tree__children::before {
        content: "";
        position: absolute;
        top: 0;
        left: 50%;
        width: 2px;
        height: 22px;
        transform: translateX(-50%);
        background: var(--tree);
      }

      .vertical-tree__child {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 18px;
      }

      .vertical-tree__child::before {
        content: "";
        position: absolute;
        top: -26px;
        left: 50%;
        width: 2px;
        height: 26px;
        transform: translateX(-50%);
        background: var(--tree);
      }

      .single-right-tree {
        display: flex;
        flex-direction: column;
        gap: 18px;
      }

      .single-right-tree__node {
        position: relative;
        display: flex;
        align-items: flex-start;
        gap: 26px;
      }

      .single-right-tree__node::before {
        content: "";
        position: absolute;
        top: 36px;
        left: calc(100% - 26px);
        width: 26px;
        height: 2px;
        background: var(--tree);
        transform: translateX(-100%);
      }

      .single-right-tree__children {
        position: relative;
        display: flex;
        flex-direction: column;
        gap: 18px;
        padding-left: 32px;
      }

      .single-right-tree__children::before {
        content: "";
        position: absolute;
        top: 24px;
        bottom: 22px;
        left: 0;
        width: 2px;
        background: linear-gradient(180deg, var(--tree), rgba(47, 121, 222, 0.08));
      }

      .branch-column {
        display: flex;
        flex-direction: column;
        gap: 26px;
        min-height: 460px;
        padding-top: 26px;
      }

      .branch-column--left {
        align-items: flex-end;
      }

      .branch-column--right {
        align-items: flex-start;
      }

      .branch-item {
        position: relative;
        display: flex;
        flex-direction: column;
        gap: 18px;
      }

      .branch-item--left {
        align-items: flex-end;
      }

      .branch-item--right {
        align-items: flex-start;
      }

      .branch-item::before {
        content: "";
        position: absolute;
        top: 36px;
        width: 26px;
        height: 2px;
        background: var(--tree);
      }

      .branch-item--left::before {
        right: -26px;
      }

      .branch-item--right::before {
        left: -26px;
      }

      .branch-children {
        position: relative;
        display: flex;
        flex-direction: column;
        gap: 18px;
      }

      .branch-children--left {
        padding-right: 32px;
      }

      .branch-children--right {
        padding-left: 32px;
      }

      .branch-children--left::before,
      .branch-children--right::before {
        content: "";
        position: absolute;
        top: -8px;
        bottom: 22px;
        width: 2px;
        background: linear-gradient(180deg, var(--tree), rgba(47, 121, 222, 0.08));
      }

      .branch-children--left::before {
        right: 0;
      }

      .branch-children--right::before {
        left: 0;
      }

      .node {
        position: relative;
        min-width: 156px;
        max-width: 228px;
        padding: 12px 16px;
        border-radius: 16px;
        text-align: center;
      }

      .node--line {
        border: 2px solid rgba(47, 121, 222, 0.28);
        background: rgba(255, 255, 255, 0.96);
        box-shadow: 0 10px 20px rgba(43, 39, 33, 0.05);
      }

      .node--fill {
        border: 2px solid rgba(47, 121, 222, 0.16);
        background: linear-gradient(180deg, rgba(228, 240, 255, 0.98), rgba(255, 255, 255, 0.96));
        box-shadow: 0 10px 22px rgba(43, 39, 33, 0.06);
      }

      .node--center {
        min-width: 210px;
        max-width: 260px;
        border-color: rgba(18, 18, 18, 0.9);
        background: #111;
        color: white;
      }

      .node.is-draggable {
        cursor: grab;
      }

      .node.is-dragging {
        opacity: 0.45;
      }

      .node.is-selected {
        border-color: rgba(26, 122, 114, 0.55);
        box-shadow: 0 0 0 4px rgba(26, 122, 114, 0.12), 0 12px 24px rgba(43, 39, 33, 0.08);
      }

      .node.drop-before {
        box-shadow: inset 0 4px 0 var(--teal), 0 14px 28px rgba(43, 39, 33, 0.08);
      }

      .node.drop-after {
        box-shadow: inset 0 -4px 0 var(--teal), 0 14px 28px rgba(43, 39, 33, 0.08);
      }

      .drop-slot {
        width: 100%;
        min-height: 12px;
      }

      .node small {
        display: block;
        margin-bottom: 4px;
        color: var(--muted);
        font-size: 11px;
      }

      .node--center small {
        color: rgba(255, 255, 255, 0.64);
      }

      .node strong {
        display: block;
        font-size: 15px;
      }

      .node-editor {
        width: 100%;
        border: 2px solid rgba(26, 122, 114, 0.22);
        border-radius: 10px;
        padding: 8px 10px;
        font: inherit;
        background: rgba(26, 122, 114, 0.05);
      }

      .node-editor:focus {
        outline: none;
        border-color: rgba(26, 122, 114, 0.38);
      }

      .node-actions {
        position: absolute;
        top: 8px;
        right: 8px;
        display: flex;
        gap: 6px;
      }

      .node-action {
        width: 24px;
        height: 24px;
        padding: 0;
        border: 0;
        border-radius: 999px;
        background: rgba(26, 122, 114, 0.12);
        color: var(--teal);
        font-size: 16px;
      }

      .node-action--danger {
        color: var(--red);
        background: rgba(239, 79, 67, 0.14);
      }

    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module">
      import(`./main.bundle.js?v=${Date.now()}`);
    </script>
  </body>
</html>
