    <path d="M380 336C504 336 510 514 650 514" stroke="#55C3FB" stroke-width="4" stroke-linecap="round"/>
    <circle cx="650" cy="514" r="12" fill="white" stroke="#55C3FB" stroke-width="4"/>
    <text x="458" y="506" class="branch">分支主题 4</text>
    <line x1="458" y1="526" x2="620" y2="526" class="guide"/>
