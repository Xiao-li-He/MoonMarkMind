<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="80" y1="40" x2="1120" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F9FCFF"/>
      <stop offset="0.64" stop-color="#EEF5FC"/>
      <stop offset="1" stop-color="#E8F0F8"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#8AA8C4" flood-opacity="0.07"/>
    </filter>
    <style>
      .title { font: 700 28px "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #27405C; }
      .center { font: 500 42px "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #475866; }
      .branch { font: 400 24px "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #4B5661; }
      .detail { font: 400 17px "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #8796A7; }
      .edit { stroke: rgba(108, 134, 159, 0.34); stroke-width: 2; stroke-linecap: round; }
      .guide { stroke: rgba(255,255,255,0.72); stroke-width: 10; stroke-linecap: round; }
    </style>
  </defs>

  <rect width="1200" height="760" rx="34" fill="url(#bg)"/>
  <text x="64" y="84" class="title">逻辑图 · 线条</text>

  <g filter="url(#soft)">
    <text x="132" y="350" class="center">中心主题</text>
    <path d="M290 336H380" stroke="#2F80C6" stroke-width="4" stroke-linecap="round"/>
    <circle cx="380" cy="336" r="12" fill="white" stroke="#2F80C6" stroke-width="4"/>

    <path d="M380 336C500 336 492 150 640 150" stroke="#E53935" stroke-width="4" stroke-linecap="round"/>
    <circle cx="640" cy="150" r="12" fill="white" stroke="#E53935" stroke-width="4"/>
    <text x="458" y="142" class="branch">分支主题 1</text>
    <line x1="458" y1="162" x2="610" y2="162" class="guide"/>
    <line x1="458" y1="162" x2="610" y2="162" class="edit"/>
    <path d="M640 150H880" stroke="#E53935" stroke-width="3" stroke-linecap="round"/>
    <circle cx="880" cy="150" r="9" fill="white" stroke="#E53935" stroke-width="3"/>
    <text x="900" y="144" class="detail">细分主题 A</text>
