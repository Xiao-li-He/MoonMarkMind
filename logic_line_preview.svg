    <path d="M380 336C482 336 494 256 640 256" stroke="#FB8C00" stroke-width="4" stroke-linecap="round"/>
    <circle cx="640" cy="256" r="12" fill="white" stroke="#FB8C00" stroke-width="4"/>
    <text x="458" y="248" class="branch">分支主题 2</text>
    <line x1="458" y1="268" x2="610" y2="268" class="guide"/>
    <line x1="458" y1="268" x2="610" y2="268" class="edit"/>
    <path d="M640 256H880" stroke="#FB8C00" stroke-width="3" stroke-linecap="round"/>
    <circle cx="880" cy="256" r="9" fill="white" stroke="#FB8C00" stroke-width="3"/>
    <text x="900" y="250" class="detail">细分主题 B</text>
    <line x1="900" y1="266" x2="1066" y2="266" class="guide"/>
    <line x1="900" y1="266" x2="1066" y2="266" class="edit"/>

    <path d="M380 336C492 336 502 378 650 378" stroke="#42C7B5" stroke-width="4" stroke-linecap="round"/>
    <circle cx="650" cy="378" r="12" fill="white" stroke="#42C7B5" stroke-width="4"/>
    <text x="458" y="370" class="branch">分支主题 3</text>
    <line x1="458" y1="390" x2="620" y2="390" class="guide"/>
